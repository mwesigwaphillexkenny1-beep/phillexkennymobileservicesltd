<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phillex Kenny Mobile Services Ltd</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to Phillex Kenny Mobile Services</h1>
        <nav>
            <ul>
                <li><a href="#services">Services</a></li>
                <li><a href="#contact">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="services">
            <h2>Our Services</h2>
            <p>We offer a wide range of mobile services tailored to your needs.</p>
            <ul>
                <li>Mobile Repairs</li>
                <li>Accessories</li>
                <li>Software Updates</li>
            </ul>
        </section>
        <section id="contact">
            <h2>Contact Us</h2>
            <form id="contactForm">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <label for="message">Message:</label>
                <textarea id="message" name="message" required></textarea>
                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Phillex Kenny Mobile Services Ltd. All Rights Reserved.</p>
    </footer>
    <script>
        const form = document.getElementById('contactForm');
        form.onsubmit = function(event) {
            event.preventDefault();
            // Add form submission logic
            alert('Form submitted!');
        };
    </script>
</body>
</html>
